<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댕큐! 초기 사이트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f6fbf8 0%, #ffffff 100%);
      color: #1a1a1a;
      padding: 24px;
    }

    .b2b-link-box {
      width: 100%;
      max-width: 420px;
      padding: 28px 24px;
      border: 1px solid #e7ece9;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      font-size: 26px;
      font-weight: 900;
      color: #2d8653;
      margin-bottom: 10px;
    }

    .b2b-title {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .b2b-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .b2b-btn {
      display: inline-block;
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      background: #2d8653;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .b2b-btn:hover {
      background: #236b42;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="b2b-link-box">
    <div class="logo">댕큐!</div>
    <p class="b2b-title">댕큐! B2B 홈페이지</p>
    <p class="b2b-desc">기업 전용 펫푸드 데이터 분석 플랫폼으로 이동합니다.</p>

    <a
      class="b2b-btn"
      href="https://junsu2357-netizen.github.io/-Pet-Preference-Data-Platform/dangq_v10 (1).html"
      target="_blank"
      rel="noopener noreferrer"
    >
      B2B 홈페이지 바로가기
    </a>

    <p class="note">* 버튼 클릭 시 새 탭에서 열립니다.</p>
  </div>
</body>
</html>
